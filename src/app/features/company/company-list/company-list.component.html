<div class="container-fluid mt-4">

  <!-- Search + Add Button -->
  <div class="row mb-3">
    <div class="col-8">
      <app-global-search
        [label]="'company.searchFilters' | translate"
        [placeholder]="'company.searchPlaceholder' | translate"
        [showStatus]="true"
        (search)="onSearch($event)"
        (clear)="clearFilters()">
      </app-global-search>
    </div>

    <div class="col-4 text-end">
      <button class="btn blue-btn" (click)="companyAddEdit.openModal()">
        {{ 'company.addCompany' | translate }}
      </button>
    </div>
  </div>

  <!-- Company Table -->
  <div class="card shadow-sm border-0">
    <div class="card-body">
      <app-reusable-table
        [columns]="columns"
        [columnFields]="columnFields"
        [data]="companies"
        [showActions]="true"
        [pageable]="true"
        [totalRecords]="totalRecords"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        (pageChange)="onPageChange($event)"
        (toggleActive)="toggleCompanyStatus($event)"
        (editRow)="companyAddEdit.openModal(true, $event)"
        (deleteRow)="deleteCompany($event)">
      </app-reusable-table>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <app-company-add-edit #companyAddEdit></app-company-add-edit>

</div>
