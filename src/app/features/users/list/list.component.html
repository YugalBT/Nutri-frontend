<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-semibold">{{ 'users.manage' | translate }}</h4>
    <button class="btn blue-btn d-flex align-items-center" (click)="userAddEdit.openModal()">
      <i class="bi bi-plus-circle me-2"></i> {{ 'users.addUser' | translate }}
    </button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <app-reusable-table
        [columns]="columns"
        [showActions]="true"
        (editRow)="userAddEdit.openModal(true, $event)">
      </app-reusable-table>
    </div>
  </div>

  <app-addedit #userAddEdit></app-addedit>
</div>
