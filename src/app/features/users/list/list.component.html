<h4>{{'users.Heading' | translate}}</h4>
<div class="container-fluid mt-4">

  <div class="row align-items-center">

    <!-- Search Section -->
    <div class="col-lg-9 col-md-8 mb-2 mb-md-0">
      <app-global-search [label]="'users.searchFilters' | translate"
        [placeholder]="'users.searchPlaceholder' | translate" [showStatus]="true" (search)="onSearch($event)"
        (clear)="clearFilters()">
      </app-global-search>
    </div>

    <!-- Add Button -->
    <div class="col-lg-3 col-md-4 text-md-end text-start mt-2 mt-md-0">
      <button class="btn blue-btn px-4 py-2" (click)="userAddEdit.openModal()">
        {{ 'users.addUser' | translate }}
      </button>
    </div>

  </div>






  <div class="card shadow-sm border-0">
    <div class="card-body">
      <app-reusable-table [columns]="columns" [showActions]="true" [data]="users" [columnFields]="columnFields"
        [pageable]="true" (toggleActive)="onToggleActive($event)" (deleteRow)="onDelete($event)"
        [totalRecords]="totalRecords" [pageSize]="pageSize" [pageIndex]="pageIndex" (pageChange)="onPageChange($event)"
        (editRow)="userAddEdit.openModal(true, $event)">
      </app-reusable-table>
    </div>
  </div>

  <app-addedit #userAddEdit></app-addedit>
</div>
