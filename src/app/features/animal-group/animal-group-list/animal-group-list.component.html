<!-- animal-group-list.component.html -->
<div class="pagecls">

  <div class="page-header d-flex justify-content-between align-items-center mb-3">
    <h3 class="page-title">{{ 'animalGroup.Heading' | translate }}</h3>
    <button class="btn add-btn" (click)="openAddModal()" [disabled]="!canAdd">
      <i class="bi bi-plus-lg me-2"></i> {{ 'animalGroup.addAnimalGroup' | translate }}
    </button>
  </div>

  <div class="filters-card mb-3">
    <app-global-search
      [placeholder]="'animalGroup.searchByGroupOrFarm' | translate"
      [showStatus]="true"
      (search)="onSearch($event)"
      (statusChange)="onStatusChange($event)"
     >
    </app-global-search>
  </div>

  <div class="table-card">
    <app-reusable-table
      [columns]="columns"
      [showActions]="true"
      [data]="animalGroups"
      [columnFields]="columnFields"
      [pageable]="true"
      [totalRecords]="totalRecords"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      (pageChange)="onPageChange($event)"
      (toggleActive)="onToggleActive($event)"
      (deleteRow)="onDelete($event)"
      (editRow)="animalGroupModalRef.openModal(true, $event)">
    </app-reusable-table>
  </div>

  <!-- Add/Edit Modal -->
  <app-animal-group-add-edit #animalGroupModal (onAnimalGroupSaved)="onModalSaved()"></app-animal-group-add-edit>

</div>
