<div #kpiModal class="modal fade" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    {{ isEdit ? ('kpi.editKpi' | translate) : ('kpi.addKpi' | translate) }}
                </h5>

                <button type="button" class="btn-close" (click)="closeModal()"></button>
            </div>

            <div class="modal-body">
                <form [formGroup]="form">

                    <div class="row g-3">

                        <!-- Farm -->
                        <div class="col-md-4">
                            <label class="form-label">Formula <sup class="text-danger">*</sup></label>
                            <select formControlName="formulaId" class="form-select" [disabled]="formulasLoading">
                                <option [ngValue]="null">Select Formula</option>
                                <option *ngFor="let f of formula" [ngValue]="f.formulaId">{{ f.formulaName }}
                                </option>
                            </select>

                            <div class="text-danger"
                                *ngIf="form.get('formulaId')?.touched && form.get('formulaId')?.invalid">
                                Formula is required.
                            </div>
                        </div>

                        <!-- Date -->
                        <div class="col-md-4">
                            <label class="form-label">{{ 'kpi.kpiName' | translate }} <sup
                                    class="text-danger">*</sup></label>

                            <input class="form-control" formControlName="kpiname"
                                [placeholder]="'kpi.kpiNamePlaceholder' | translate" />

                            <div class="text-danger"
                                *ngIf="form.get('kpiname')?.touched && form.get('kpiname')?.errors?.['required']">
                                {{ 'kpi.validation.kpiNameRequired' | translate }}
                            </div>

                            <div class="text-danger"
                                *ngIf="form.get('kpiname')?.touched && form.get('kpiname')?.errors?.['maxlength']">
                                {{ 'kpi.validation.kpiNameMaxLength' | translate }}
                            </div>



                        </div>

                        <!-- Display Type -->
                        <div class="col-md-4">
                            <label class="form-label">Display Type <sup class="text-danger">*</sup></label>
                            <select formControlName="displayType" class="form-select">
                                <option *ngFor="let opt of displayTypeOptions" [value]="opt.value">
                                    {{ opt.label }}
                                </option>
                            </select>
                        </div>

                        <!-- Display Location -->
                        <div class="col-md-4">
                            <label class="form-label">Show On <sup class="text-danger">*</sup></label>
                            <select formControlName="displayLocation" class="form-select">
                                <option *ngFor="let opt of displayLocationOptions" [value]="opt.value">
                                    {{ opt.label }}
                                </option>
                            </select>
                        </div>

                        <!-- Gauge Min / Max — only relevant when gauge is selected -->
                        <ng-container *ngIf="form.get('displayType')?.value === 'gauge'">
                            <div class="col-md-2">
                                <label class="form-label">Gauge Min</label>
                                <input type="number" class="form-control" formControlName="gaugeMin" />
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Gauge Max</label>
                                <input type="number" class="form-control" formControlName="gaugeMax" />
                            </div>
                        </ng-container>

                        <!-- Sort Order -->
                        <div class="col-md-2">
                            <label class="form-label">Sort Order</label>
                            <input type="number" class="form-control" formControlName="sortOrder" min="0" />
                        </div>

                    </div>

                </form>
            </div>

            <div class="modal-footer">
                <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
                <button *ngIf="canSave" class="btn add-btn" (click)="savekpi()" [disabled]="form.invalid">
                    {{ isEdit ? 'Update' : 'Save' }}
                </button>
            </div>

        </div>
    </div>
</div>
