<div class="container mt-4 mb-4" *ngIf="profileForm">
  <div class="card shadow-sm border-0 rounded-4 p-4">

    <div class="d-flex align-items-center mb-4">
      <i class="bi bi-person-circle fs-2 me-3"></i>
      <h4 class="mb-0 fw-bold">Update Profile</h4>
    </div>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">

      <div class="row mt-3">
        <div class="col-md-4">
          <label class="form-label">First Name *</label>
          <input type="text" class="form-control" formControlName="firstName">
          <div class="text-danger mt-1" *ngIf="profileForm.get('firstName')?.touched && profileForm.get('firstName')?.invalid">
            First Name is required.
        </div>

        <div class="col-md-4">
          <label class="form-label">Middle Name</label>
          <input type="text" class="form-control" formControlName="middleName">
        </div>

        <div class="col-md-4">
          <label class="form-label">Last Name *</label>
          <input type="text" class="form-control" formControlName="lastName">
          <div class="text-danger mt-1" *ngIf="profileForm.get('lastName')?.touched && profileForm.get('lastName')?.invalid">
            Last Name is required.
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-md-6">
          <label class="form-label">Email (Not Editable) *</label>
          <input type="email" class="form-control" formControlName="email" readonly>
        </div>

        <div class="col-md-6">
          <label class="form-label">Phone Number *</label>
          <input type="text" class="form-control" formControlName="phone">
          <div *ngIf="form.get('phoneNumber')?.touched" class="text-danger">

                                <!-- Required -->
                                <div *ngIf="form.get('phoneNumber')?.errors?.['required']">
                                Phone Number is required.
                                </div>

                                <!-- Minimum length -->
                                <div *ngIf="form.get('phoneNumber')?.errors?.['minlength']">
                                Phone Number must be at least 10 digits.
                                </div>
                                 <!-- Maximum length -->
                                <div *ngIf="form.get('phoneNumber')?.errors?.['maxlength']">
                                Phone Number must be at most 10 digits.
                                </div>
                                <!-- Only numbers allowed -->
                                <div *ngIf="form.get('phoneNumber')?.errors?.['pattern']">
                                Phone Number must contain digits only.
                                </div>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button class="btn blue-btn px-4" type="submit">
          <i class="bi bi-save2 me-2"></i> Update Profile
        </button>
      </div>

    </form>

  </div>
</div>
