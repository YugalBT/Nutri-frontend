<!-- parti-add-edit.component.html -->
<div #modal class="modal fade" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Edit Calving' : 'Add Calving' }}</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="form">
          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label">Calving Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" formControlName="calvingDate">
            </div>

            <div class="col-md-4">
              <label class="form-label">Cow ID / Ear Tag</label>
              <input type="text" class="form-control" formControlName="cowId" placeholder="e.g. IT001">
            </div>

            <div class="col-md-4">
              <label class="form-label">Cow Name</label>
              <input type="text" class="form-control" formControlName="cowName" placeholder="Optional">
            </div>

            <div class="col-md-4">
              <label class="form-label">Calf Gender</label>
              <select class="form-select" formControlName="calfGender">
                <option value="">— select —</option>
                <option *ngFor="let g of genderOptions" [value]="g.value">{{ g.label }}</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Calving Type</label>
              <select class="form-select" formControlName="calvingType">
                <option *ngFor="let t of typeOptions" [value]="t">{{ t }}</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Calving Outcome</label>
              <select class="form-select" formControlName="calvingOutcome">
                <option *ngFor="let o of outcomeOptions" [value]="o">{{ o }}</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Calf Weight (kg)</label>
              <input type="number" class="form-control" formControlName="calfWeightKg" min="0" step="0.1">
            </div>

            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" formControlName="notes" rows="2" placeholder="Any observations..."></textarea>
            </div>

          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" (click)="closeModal()">Cancel</button>
        <button class="btn add-btn" [disabled]="isSaving" (click)="save()">
          {{ isSaving ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
        </button>
      </div>
    </div>
  </div>
</div>
