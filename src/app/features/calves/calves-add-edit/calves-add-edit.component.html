<div #calvesModal class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Edit Calves Ration' : 'Add Calves Ration' }}</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

          <div class="row g-3">

            <!-- Day -->
            <div class="col-md-4">
              <label class="form-label">Day <sup class="text-danger">*</sup></label>
              <select formControlName="dayId" class="form-select" [disabled]="daysLoading">
                <option [ngValue]="null">Select Day</option>
                <option *ngFor="let d of days" [ngValue]="d.dayId">{{ d.date}}</option>
              </select>
            </div>

            <!-- Age Class -->
            <div class="col-md-4">
              <label class="form-label">Age Class <sup class="text-danger">*</sup></label>
              <input type="text" class="form-control" formControlName="ageClass" placeholder="Enter Age Class" />
            </div>

            <!-- Feed -->
            <div class="col-md-4">
              <label class="form-label">Feed <sup class="text-danger">*</sup></label>
              <select formControlName="feedId" class="form-select" [disabled]="feedsLoading">
                <option [ngValue]="null">Select Feed</option>
                <option *ngFor="let f of feeds" [ngValue]="f.feedId">{{ f.feedName }}</option>
              </select>
            </div>

            <!-- Kg/Head -->
            <div class="col-md-4">
              <label class="form-label">Kg Per Head Per Day <sup class="text-danger">*</sup></label>
              <input type="number" min="0" class="form-control" formControlName="kgPerHeadPerDay" />
              <div *ngIf="form.get('kgPerHeadPerDay')?.errors?.['maxDigits']" class="text-danger">
              Maximum 20 digits are allowed.
            </div> 
            </div>

            <!-- Cost -->
            <div class="col-md-4">
              <label class="form-label">Cost Per Head Per Day <sup class="text-danger">*</sup></label>
              <input type="number" min="0" class="form-control" formControlName="costPerHeadPerDay" />
              <div *ngIf="form.get('costPerHeadPerDay')?.errors?.['maxDigits']" class="text-danger">
              Maximum 20 digits are allowed.
            </div> 
            </div>

          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn add-btn" (click)="saveCalves()">
          {{ isEdit ? 'Update' : 'Save' }}
        </button>
      </div>

    </div>
  </div>
</div>
