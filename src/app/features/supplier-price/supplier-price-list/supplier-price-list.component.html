<div class="container-fluid py-4">

  <!-- PAGE TITLE -->
  <div class="d-flex align-items-center mb-4">
    <div class="border-start border-4 ps-3">
      <h4 class="fw-bold mb-0">
        {{ "supplierPrice.heading" | translate }}
      </h4>
    </div>
  </div>

  <!-- SUPPLIER DROPDOWN -->
  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body">

      <div class="row g-3">

        <div class="col-lg-4 col-md-6 col-sm-12">

          <label class="form-label fw-semibold">
            {{ "supplierPrice.supplier" | translate }}
            <span class="text-danger">*</span>
          </label>

          <select
            class="form-select"
            [(ngModel)]="selectedSupplierId"
            (change)="onSupplierChange()">

            <option [ngValue]="null">
              {{ "supplierPrice.selectSupplier" | translate }}
            </option>

            <option
              *ngFor="let s of suppliers"
              [value]="s.supplierId">

              {{ s.supplierName }}

            </option>

          </select>

        </div>

      </div>

    </div>
  </div>


  <!-- MATERIAL TABLE -->
  <div class="card shadow-sm border-0">

    <div class="card-body p-0">

      <div class="table-responsive">

        <table class="table table-hover align-middle mb-0">

          <thead class="table-light">

            <tr>

              <th style="width:60px">SN</th>

              <th>Material</th>

              <th>Code</th>

              <th style="min-width:140px">Price</th>

              <th style="min-width:160px">Discount %</th>

              <th style="min-width:160px">Delivered Price</th>

              <th style="min-width:160px">Price Month</th>

              <th style="min-width:160px">
                {{ "supplierPrice.columns.SupplierPriceStatus" | translate }}
              </th>

            </tr>

          </thead>


          <tbody>

            <tr *ngFor="let m of materials; let i=index">

              <!-- SN -->
              <td class="fw-semibold">
                {{ i+1 }}
              </td>

              <!-- MATERIAL -->
              <td class="fw-medium">
                {{ m.materialName }}
              </td>

              <!-- CODE -->
              <td>
                {{ m.materialCode }}
              </td>


              <!-- PRICE -->
              <td>

                <div class="input-group input-group-sm">

                  <span class="input-group-text">€</span>

                  <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    [(ngModel)]="m.price"
                    (ngModelChange)="onPriceChange(m)"
                    placeholder="0.00">

                </div>

              </td>


              <!-- DISCOUNT -->
              <td>

                <div class="input-group input-group-sm">

                  <span class="input-group-text">%</span>

                  <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    [(ngModel)]="m.discountPercent"
                    (ngModelChange)="markChanged(m)"
                    placeholder="0.00">

                </div>

              </td>


              <!-- DELIVERED PRICE -->
              <td>

                <div class="input-group input-group-sm">

                  <span class="input-group-text">€</span>

                  <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    readonly
                    [(ngModel)]="m.deliveredPrice"
                    (ngModelChange)="onPriceChange(m)"
                    placeholder="0.00">

                </div>

              </td>


              <!-- PRICE MONTH -->
              <td>

                <input
                  type="month"
                  class="form-control form-control-sm"
                  [(ngModel)]="m.priceMonth"
                  (ngModelChange)="onPriceChange(m)">

              </td>

              <td>

                <select
                  class="form-select form-select-sm"
                  [(ngModel)]="m.supplierStatus"
                  (ngModelChange)="onPriceChange(m)">

                  <option [ngValue]="2" disabled>
                    Select Status
                  </option>

                  <option [ngValue]="0">
                    Approved
                  </option>

                  <option [ngValue]="1">
                    Draft
                  </option>

                </select>

              </td>

            </tr>

          </tbody>

        </table>


        <!-- NO DATA -->

        <div *ngIf="materials.length === 0"
             class="text-center py-5">

          <img
            src="assets/image/no-data.png"
            width="140"
            class="mb-3">

          <h5 class="text-muted">
            {{ "common.noData" | translate }}
          </h5>

        </div>

      </div>

    </div>


    <!-- FOOTER -->

    <div class="card-footer bg-white text-end py-3">

      <button
        class="btn btn-outline-secondary me-2 px-4"
        (click)="clearAll()">

        Clear

      </button>

      <button
        class="btn add-btn px-5 shadow-sm"
        (click)="saveAll()">

        Save All

      </button>

    </div>

  </div>

</div>
