<div #templateModal class="modal fade " tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">
          {{ isEdit ? 'Edit Template' : 'Add Template' }}
        </h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <form *ngIf="form" [formGroup]="form">

          <!-- BASIC DETAILS -->
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Category *</label>
              <select class="form-select" formControlName="categoryId">
                <option [ngValue]="null">Select Category</option>
                <option *ngFor="let c of categories" [value]="c.categoryId">
                  {{ c.displayName || c.category }}
                </option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Template Type *</label>
              <select class="form-select" formControlName="type">
                <option [ngValue]="null">Select Type</option>
                <option value="Email">Email</option>
                <option value="PDF">PDF</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Document Name *</label>
              <input class="form-control" formControlName="subject" placeholder="Enter Document Name" />
              <div class="text-danger"
                *ngIf="form.get('subject')?.touched && form.get('subject')?.errors?.['required']">
                Document name is required
              </div>

              <div class="text-danger"
                *ngIf="form.get('subject')?.touched && form.get('subject')?.errors?.['maxlength']">
                Document name must be at least 50 characters
              </div>
            </div>
          </div>

          <div class="row mt-3">
            <div class="col-md-8">
              <textarea id="ng-ckeditor-textarea" class="form-control" style="min-height:300px">
              </textarea>
            </div>

            <div class="col-md-4">
              <label class="form-label">Placeholders</label>

              <input #searchInput class="form-control mb-2" placeholder="Search Placeholders"
                (input)="onPlaceholderSearch(searchInput.value)" />

              <div class="chip-wrapper">
                <span class="chip-item" *ngFor="let p of filteredPlaceholders"
                  (click)="insertPlaceholder(p.placeholderValue)">
                  {{ p.placeholderValue }}
                  <!-- <span class="chip-icon">+</span> -->
                </span>
              </div>
            </div>
          </div>

        </form>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">
          Cancel
        </button>
        <button class="btn add-btn" (click)="save()">
          Submit
        </button>
      </div>

    </div>
  </div>
</div>
