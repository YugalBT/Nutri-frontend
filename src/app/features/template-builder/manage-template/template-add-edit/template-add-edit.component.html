<div #templateModal class="modal fade" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">
          {{ isEdit
          ? ('templates.edit' | translate)
          : ('templates.add' | translate)
          }}
        </h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>

      <!-- BODY -->
      <div class="modal-body">
        <form *ngIf="form" [formGroup]="form">

          <!-- BASIC DETAILS -->
          <div class="row g-3">

            <!-- CATEGORY -->
            <div class="col-md-3">
              <label class="form-label">
                {{ 'templates.columns.category' | translate }} *
              </label>
              <select class="form-select" formControlName="categoryId">
                <option [ngValue]="null">
                  {{ 'templates.selectcategory' | translate }}
                </option>
                <option *ngFor="let c of categories" [value]="c.categoryId">
                  {{ c.displayName || c.category }}
                </option>
              </select>
            </div>

            <!-- TEMPLATE TYPE -->
            <div class="col-md-3">
              <label class="form-label">
                {{ 'templates.selectType' | translate }} *
              </label>
              <select class="form-select" formControlName="type">
                <option [ngValue]="null">
                  {{ 'templates.selectType' | translate }}
                </option>
                <option value="Email">Email</option>
                <option value="PDF">PDF</option>
              </select>
            </div>

            <!-- DOCUMENT NAME -->
            <div class="col-md-3">
              <label class="form-label">
                {{ 'templates.columns.subject' | translate }} *
              </label>
              <input class="form-control" formControlName="subject"
                [placeholder]="'templates.columns.subject' | translate" />

              <div class="text-danger"
                *ngIf="form.get('subject')?.touched && form.get('subject')?.errors?.['required']">
                {{ 'common.required' | translate }}
              </div>

              <div class="text-danger"
                *ngIf="form.get('subject')?.touched && form.get('subject')?.errors?.['maxlength']">
                {{ 'common.maxlength50' | translate }}
              </div>
            </div>
            <ng-container *ngIf="user$ | async as user">
              <div class="col-md-3" *ngIf="user.isSuperAdmin">
                <label class="form-label">Master Template</label>

                <label class="switch">
                  <input type="checkbox" formControlName="isMasterData">
                  <span class="slider"></span>
                </label>
              </div>
            </ng-container>

          </div>

          <!-- EDITOR + PLACEHOLDERS -->
          <div class="row mt-3">
            <div class="col-md-8">
              <textarea id="ng-ckeditor-textarea" class="form-control" style="min-height:300px">
              </textarea>
            </div>

            <div class="col-md-4">
              <label class="form-label">
                {{ 'placeholders.heading' | translate }}
              </label>

              <input #searchInput class="form-control mb-2" [placeholder]="'placeholders.search' | translate"
                (input)="onPlaceholderSearch(searchInput.value)" />

              <div class="chip-wrapper">
                <span class="chip-item" *ngFor="let p of filteredPlaceholders"
                  (click)="insertPlaceholder(p.placeholderValue)">
                  {{ p.placeholderValue }}
                </span>
              </div>
            </div>
          </div>

        </form>
      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">
          {{ 'common.cancel' | translate }}
        </button>
        <button class="btn add-btn" (click)="save()">
          {{ 'common.submit' | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
