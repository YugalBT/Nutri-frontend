<div class="pagecls">

  <!-- Page Header -->
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="page-title">
        {{ 'templates.heading' | translate }}
      </h3>
    </div>

    <button class="btn add-btn" (click)="templateModal.openModal()">
      <i class="bi bi-plus-lg me-2"></i>
      {{ 'templates.add' | translate }}
    </button>
  </div>

  <!-- Search Filters Section -->
  <div class="filters-card">
    <app-global-search
     [label]="'role.searchFilters' | translate"
      [placeholder]="'common.searchByName' | translate"
      [showStatus]="true"
      (search)="onSearch($event)"
      (statusChange)="onStatusChange($event)"
      (clear)="clearFilters()">
    </app-global-search>
  </div>

  <!-- Templates Table -->
  <div class="table-card">
    <app-reusable-table
      [columns]="columns"
      [columnFields]="columnFields"
      [data]="templates"
      [showActions]="true"
      [pageable]="true"
      [totalRecords]="totalRecords"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      (pageChange)="onPageChange($event)"
      (toggleActive)="onToggleActive($event)"
      (deleteRow)="onDelete($event)"
      (editRow)="templateModal.openModal(true, $event)">
    </app-reusable-table>
  </div>

  <!-- Add/Edit Modal -->
  <app-template-add-edit #templateModal></app-template-add-edit>

</div>
