<div class="pagecls">

    <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="page-title">{{ 'placeholderMapping.heading' | translate }}</h3>
    </div>

    <button *ngIf="canAddMapping" class="btn add-btn" (click)="mappingModal.openModal()">
      <i class="bi bi-plus-lg me-2"></i>
       {{ 'placeholderMapping.add' | translate }}
    </button>
  </div>
  

  <app-global-search
   [label]="'role.searchFilters' | translate"
    [showStatus]="true"
    [placeholder]="'Search by  name .'"
    (search)="searchValue = $event; loadMappings(1, pageSize)"
    (statusChange)="filterStatus = $event; loadMappings(1, pageSize)">
  </app-global-search>

  <app-reusable-table
    [columns]="columns"
    [columnFields]="columnFields"
    [data]="mappings"
    [pageable]="true"
    [totalRecords]="totalRecords"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [viewPermission]="viewPermission"
    [editPermission]="editPermission"
    [deletePermission]="deletePermission"
    (toggleActive)="onToggleActive($event)"
    (deleteRow)="onDelete($event)"
    [showActions]="true"
    (editRow)="mappingModal.openModal(true, $event)">
  </app-reusable-table>

  <app-placeholder-mapping-add-edit #mappingModal></app-placeholder-mapping-add-edit>

</div>
