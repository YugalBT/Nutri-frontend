<div class="card p-3 template-tabs">

  <ul class="nav nav-tabs mb-3" >

    <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'category'"
        (click)="setTab('category')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M3 7h18M3 12h18M3 17h18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>
      </svg>
       {{'templateBuilder.manageCategoryheading'| translate}}
      </button>
    </li>

    <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'placeholders'"
        (click)="setTab('placeholders')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7"
              stroke="currentColor" stroke-width="2"/>
        <rect x="14" y="3" width="7" height="7"
              stroke="currentColor" stroke-width="2"/>
        <rect x="3" y="14" width="7" height="7"
              stroke="currentColor" stroke-width="2"/>
        <rect x="14" y="14" width="7" height="7"
              stroke="currentColor" stroke-width="2"/>
      </svg>
        {{'templateBuilder.managePlaceholderheading'| translate}}
      </button>
    </li>

    <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'mapping'"
        (click)="setTab('mapping')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M10 6H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h4"
              stroke="currentColor" stroke-width="2"/>
        <path d="M14 6h4a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-4"
              stroke="currentColor" stroke-width="2"/>
        <path d="M8 12h8"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round"/>
      </svg>
       {{'templateBuilder.managePlaceholderMappingheading'| translate}}
       
      </button>
    </li>

    <!-- <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'template'"
        (click)="setTab('template')">
         <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M4 4h16v16H4z"
              stroke="currentColor" stroke-width="2"/>
        <path d="M8 8h8M8 12h8M8 16h5"
              stroke="currentColor" stroke-width="2"
              stroke-linecap="round"/>
      </svg>
        Manage Notification Template
      </button>
    </li> -->

  </ul>

  <div class="tab-content">
    <ng-container *ngIf="activeTab === 'category'">
      <app-template-category-list></app-template-category-list>
    </ng-container>

    <ng-container *ngIf="activeTab === 'placeholders'">
      <app-manage-placeholders></app-manage-placeholders>
    </ng-container>

    <ng-container *ngIf="activeTab === 'mapping'">
      <app-manage-placeholder-mapping></app-manage-placeholder-mapping>
    </ng-container>
  </div>

</div>
