<div class="pagecls">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h3 class="page-title">{{ 'placeholder.heading' | translate }}</h3>
    </div>

    <button *ngIf="canAddPlaceholder" class="btn add-btn" (click)="placeholderModal.openModal()">
      <i class="bi bi-plus-lg me-2"></i>
      {{ 'placeholder.add' | translate }}
    </button>
  </div>

  <app-global-search
   [label]="'role.searchFilters' | translate"
    [showStatus]="true"
    [placeholder]="'Search by  name .'"
    (search)="onSearch($event)"
    (statusChange)="onStatusChange($event)"
    (clear)="clearFilters()">
  </app-global-search>

  <app-reusable-table
    [columns]="columns"
    [columnFields]="columnFields"
    [data]="placeholders"
    [pageable]="true"
    [totalRecords]="totalRecords"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [viewPermission]="viewPermission"
    [editPermission]="editPermission"
    [deletePermission]="deletePermission"
    (pageChange)="onPageChange($event)"
    [showActions]="true"
    (toggleActive)="onToggleActive($event)"
    (deleteRow)="onDelete($event)"
    (editRow)="placeholderModal.openModal(true, $event)">
  </app-reusable-table>

  <app-template-placeholder-add-edit #placeholderModal></app-template-placeholder-add-edit>

</div>
