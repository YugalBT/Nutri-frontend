<div #placeholderModal class="modal fade">
  <div class="modal-dialog modal-md modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5>{{ isEdit ? 'Edit Placeholder' : 'Add Placeholder' }}</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">
          <label class="form-label">Placeholder Value <span class="text-danger">*</span></label>
          <input class="form-control" formControlName="placeholderValue" placeholder="Enter placeholder value">


          <div class="text-danger"
            *ngIf="form.get('placeholderValue')?.touched && form.get('placeholderValue')?.errors?.['maxlength']">
            Placeholder Value must be at least 50 characters
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
        <button *ngIf="canSave" class="btn add-btn" (click)="save()" [disabled]="form.invalid">
          {{ isEdit ? 'Update' : 'Save' }}
        </button>
      </div>

    </div>
  </div>
</div>
