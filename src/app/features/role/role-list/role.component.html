<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-semibold">{{ 'role.manage' | translate }}</h2>
    <button *appHasPermission="'AddRole'" class="btn btn-primary d-flex align-items-center" (click)="onAddRole()">
      <i class="bi bi-plus-circle me-2"></i> {{ 'common.add' | translate }} {{ 'role.role' | translate }}
    </button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <app-reusable-table
        [columns]="columns"
        [columnFields]="columnFields"
        [data]="roles"
        [totalRecords]="totalRecords"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showActions]="canManageRoles"
        (editRow)="onEditRole($event)"
        (deleteRow)="onDeleteRole($event)"
        (pageChange)="onPageChange($event)">
      </app-reusable-table>
    </div>
  </div>
</div>

<app-user-role-addedit #roleAddEdit (saved)="loadRoles()"></app-user-role-addedit>
