<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="fw-semibold">Roles</h2>
    <button class="btn btn-primary d-flex align-items-center" (click)="roleAddEdit.openModal()">
      <i class="bi bi-plus-circle me-2"></i> Add Role
    </button>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <app-reusable-table
        [columns]="['Company','Name','Description','Active']"
        [data]="roles"
        [showActions]="true"
        (editRow)="roleAddEdit.openModal(true, $event)">
      </app-reusable-table>
    </div>
  </div>

  <!-- Reference Add/Edit Component -->
  <app-role-add-edit #roleAddEdit></app-role-add-edit>
</div>
