<div #rationModal class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Edit Ration' : 'Add Ration' }}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

          <!-- TOP ROW -->
          <div class="row g-3">

            <!-- Farm List -->
            <div class="col-md-6">
              <label class="form-label">Farm <sup class="text-danger">*</sup></label>
              <select class="form-select" formControlName="farmId" [disabled]="farmsLoading">
                <option [ngValue]="null">Select Farm</option>
                <option *ngFor="let f of farms" [ngValue]="f.farmId">
                  {{ f.farmName }}
                </option>
              </select>

              <div *ngIf="form.get('farmId')?.touched && form.get('farmId')?.invalid" class="text-danger">
                Farm is required.
              </div>
            </div>

            <!-- Ration Name -->
            <div class="col-md-6">
              <label class="form-label">Ration Name <sup class="text-danger">*</sup></label>
              <input type="text" formControlName="name" class="form-control" placeholder="Enter ration name">

              <div *ngIf="form.get('name')?.touched && form.get('name')?.invalid" class="text-danger">
                <div *ngIf="form.get('name')?.errors?.['required']">Ration Name is required.</div>
                <div *ngIf="form.get('name')?.errors?.['pattern']">Only alphabets & spaces allowed.</div>
              </div>
            </div>

          </div>

          <!-- SECOND ROW -->
          <div class="row g-3 mt-2">

            <!-- Target Group -->
            <div class="col-md-6">
              <label class="form-label">Target Group <sup class="text-danger">*</sup></label>
              <input type="text" formControlName="targetGroup" class="form-control" placeholder="Enter target group">

              <div *ngIf="form.get('targetGroup')?.touched && form.get('targetGroup')?.invalid" class="text-danger">
                <div *ngIf="form.get('targetGroup')?.errors?.['required']">Target Group is required.</div>
                <div *ngIf="form.get('targetGroup')?.errors?.['pattern']">Only alphabets & spaces allowed.</div>
              </div>
            </div>

            <!-- Vitelli Toggle -->
            <div class="col-md-6"><br>
              <label class="form-label">For Calves</label>
              <label class="switch">
                <input type="checkbox" formControlName="isForVitelli">
                <span class="slider"></span>
              </label>
            </div>
          </div>

          <!-- RATION ITEMS -->
          <div class="ration-divider mt-3 mb-2">
            <span>Ration Items</span>
          </div>

          <div formArrayName="rationItems" class="mt-3">
            <div *ngFor="let item of rationItems.controls; let i = index" [formGroupName]="i"
              class="row g-3 align-items-center mt-2">

              <!-- FEED DROPDOWN -->
              <div class="col-md-6">
                <label class="form-label">Select Feed <sup class="text-danger">*</sup></label>
                <select class="form-select" formControlName="feedId">
                  <option [ngValue]="null">Select Feed</option>
                  <option *ngFor="let feed of feeds" [ngValue]="feed.feedId">
                    {{ feed.feedName }}
                  </option>
                </select>
                <div *ngIf="item.get('feedId')?.touched && item.get('feedId')?.invalid" class="text-danger">
                  Feed is required.
                </div>
              </div>

              <!-- PER KG -->
              <div class="col-md-4">
                <label class="form-label">Per Kg (kg/day per cow) <sup class="text-danger">*</sup></label>
                <input type="number" class="form-control" formControlName="perKg" placeholder="Per Kg">
              </div>

              <!-- ADD / REMOVE -->
              <div class="col-md-2 d-flex gap-2">
                <button type="button" class="btn btn-success btn-sm" (click)="addRationItem()">+</button>
                <button *ngIf="rationItems.length > 1" type="button" class="btn btn-danger btn-sm"
                  (click)="removeRationItem(i)">-</button>
              </div>

            </div>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn add-btn" (click)="saveRation()">
          {{ isEdit ? 'Update' : 'Save' }}
        </button>
      </div>

    </div>
  </div>
</div>
