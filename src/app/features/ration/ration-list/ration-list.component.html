<div class="pagecls">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <h3 class="page-title">{{ 'ration.Heading' | translate }}</h3>
    </div>

    <!-- ADD BUTTON - ONLY SHOW IF HAS ADD PERMISSION -->
    <button *ngIf="canAddRation" class="btn add-btn" (click)="openAddRationModal()">
      <i class="bi bi-plus-lg me-2"></i>
      {{ 'ration.addRation' | translate }}
    </button>
  </div>

  <!-- Company selector for superadmin -->
  <div *ngIf="isSuperAdmin && companies.length > 0" class="filters-card pb-0">
    <div class="d-flex align-items-center gap-2">
      <label class="form-label mb-0 text-muted" style="white-space:nowrap;">{{ 'dailyEntry.filters.company' | translate }}</label>
      <select class="form-select form-select-sm" style="width:220px"
        [(ngModel)]="selectedCompanyId" (change)="onCompanyChange()">
        <option *ngFor="let c of companies" [value]="c.id">{{ c.name }}</option>
      </select>
    </div>
  </div>

  <div class="filters-card">
    <app-global-search
      [placeholder]="'ration.searchByRationNameOrType' | translate"
      [showStatus]="true"
      (search)="onSearch($event)"
      (statusChange)="onStatusChange($event)"
      (clear)="clearFilters()">
    </app-global-search>
  </div>

  <div class="table-card">
    <app-reusable-table
      [columns]="columns"
      [showActions]="true"
      [data]="ration"
      [columnFields]="columnFields"
      [pageable]="true"
      [totalRecords]="totalRecords",
     
      [viewPermission]="viewPermission"
      [editPermission]="editPermission"
      [deletePermission]="deletePermission"
      (cellClick)="onCellClick($event)"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      (pageChange)="onPageChange($event)"
      (toggleActive)="onToggleActive($event)"
      (deleteRow)="onDelete($event)"
      (editRow)="rationModal.openModal(true, $event)">
    </app-reusable-table>
  </div>

  <!-- Add/Edit Modal -->
<app-ration-add-edit #rationModal></app-ration-add-edit>

</div>
