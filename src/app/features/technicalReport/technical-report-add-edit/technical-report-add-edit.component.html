<div #reportModal class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">
                <h5 class="modal-title">
                    {{ isEdit ? 'Save Technical Report' : 'Save Technical Report' }}
                </h5>
                <button class="btn-close" (click)="closeModal()"></button>
            </div>

            <!-- BODY -->
            <div class="modal-body">
                <form [formGroup]="form">

                    <div class="row g-3">



                        <!-- DATE -->
                        <div class="col-md-6">
                            <label class="form-label">Date <span class="text-danger">*</span></label>

                            <div class="date-box" [class.disabled]="form.get('reportDate')?.disabled"
                                (click)="!form.get('reportDate')?.disabled && openDatePicker()">

                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none"
                                    stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                                    stroke-linejoin="round" viewBox="0 0 24 24">
                                    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
                                    <path d="M3 10h18"></path>
                                    <path d="M8 2v4"></path>
                                    <path d="M16 2v4"></path>
                                </svg>

                                <span>
                                    {{ form.get('reportDate')?.value
                                    ? (form.get('reportDate')?.value | date:'MMMM d, yyyy')
                                    : 'Select date' }}
                                </span>
                            </div>

                            <input #dateInput type="date" class="hidden-date-input" formControlName="reportDate">
                        </div>

                        <!-- ANIMAL COUNT -->
                        <div class="col-md-6">
                            <label class="form-label">Animal Count <span class="text-danger">*</span></label>
                            <input type="number" min="1" class="form-control" formControlName="animalCount"
                                [placeholder]="'Enter Number of Animal'">
                        </div>

 

                    </div>

                </form>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer">
                <button class="btn " (click)="closeModal()">Cancel</button>
                <button class="btn add-btn" (click)="save()">
                    {{ isEdit ? 'Update' : 'Save' }}
                </button>
            </div>

        </div>
    </div>
</div>
