<div class="container mt-4" *ngIf="companyForm">
  <div class="card shadow-sm p-4">

    <h4 class="fw-bold mb-3">Company Settings</h4>

    <form [formGroup]="companyForm" (ngSubmit)="onSubmit()">

      <!-- Logo -->
      <div class="text-center mb-4">
        <label class="form-label fw-bold">Company Logo</label>
        <div class="img-container">
          <img *ngIf="imagePreview" [src]="imagePreview" class="profile-img" />
          <div class="action-buttons mt-2">
            <label class="upload-btn">
              <input type="file" #fileInput (change)="onImageChange($event)" hidden />
              Upload Logo
            </label>
            <button *ngIf="imagePreview" class="btn btn-danger ms-2" type="button" (click)="removeImage()">Remove</button>
          </div>
        </div>
        <small class="text-muted">Allowed: JPG / PNG</small>
      </div>

      <!-- Company Info -->
      <div class="row">
        <div class="col-md-6">
          <label>Company Name *</label>
          <input formControlName="companyName" class="form-control">
        </div>
        <div class="col-md-6">
          <label>Email</label>
          <input formControlName="email" class="form-control">
        </div>
      </div>

      <!-- Phone & Address -->
      <div class="row mt-3">
        <div class="col-md-6"><label>Phone</label><input formControlName="phoneNumber" class="form-control"></div>
        <div class="col-md-6"><label>Street Address</label><input formControlName="streetAddress" class="form-control"></div>
      </div>

      <!-- Required Fields From Backend -->
      <div class="row mt-3">
        <div class="col-md-4">
          <label>City *</label>
          <input formControlName="city" class="form-control">
          <div *ngIf="companyForm.get('city')?.invalid && companyForm.get('city')?.touched" class="text-danger">
            Invalid City (Only letters allowed)
          </div>
        </div>
        <div class="col-md-4">
          <label>Country *</label>
          <input formControlName="country" class="form-control">
        </div>
        <div class="col-md-4">
          <label>Zip Code *</label>
          <input formControlName="zipCode" class="form-control">
          <small *ngIf="companyForm.get('zipCode')?.invalid && companyForm.get('zipCode')?.touched" class="text-danger">
            Zip must be 5 or 6 digits
          </small>
        </div>
      </div>

      <!-- Colors -->
      <div class="row mt-3">
        <div class="col-md-6"><label>Primary Color</label><input type="color" formControlName="primaryColor" class="form-control"></div>
        <div class="col-md-6"><label>Secondary Color</label><input type="color" formControlName="secondaryColor" class="form-control"></div>
      </div>

      <!-- Dates -->
      <div class="row mt-3">
        <div class="col-md-6"><label>Effective Date</label><input type="date" formControlName="effectiveDate" class="form-control"></div>
        <div class="col-md-6"><label>Expiry Date</label><input type="date" formControlName="expiryDate" class="form-control"></div>
      </div>

      <div class="text-end mt-4">
        <button class="btn btn-primary px-4" type="submit">Save Settings</button>
      </div>
    </form>
  </div>
</div>
