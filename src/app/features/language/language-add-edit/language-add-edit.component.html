<!-- language.component.html -->
<div #languageModal class="modal fade" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          {{ isEdit ? 'Edit Language' : 'Add Language' }}
        </h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

              <!-- Language Name -->
          <div class="mb-3">
            <label class="form-label">{{ 'language.languageName' | translate }}</label>
            <sup style="color: #f00; font-size: 12px;">*</sup>
            <input type="text" class="form-control"
                   formControlName="languageName"
                   placeholder="{{ 'language.languageNamePlaceholder' | translate }}">
            <div class="text-danger" *ngIf="isInvalid('languageName')">
              {{ 'language.languageNameRequired' | translate }}
            </div>
          </div>
          <!-- Language Code -->
          <div class="mb-3">
            <label class="form-label">{{ 'language.languageCode' | translate }}</label>
              <sup style="color: #f00; font-size: 12px;">*</sup>
            <input type="text" class="form-control"
                   formControlName="languageCode"
                   placeholder="{{ 'language.languageCodePlaceholder' | translate }}">
            <div class="text-danger" *ngIf="isInvalid('languageCode')">
              {{ 'language.languageCodeRequired' | translate }}
            </div>
          </div>

        

          <!-- Active -->
          <!-- <div class="form-check">
            <input class="form-check-input"
                   type="checkbox"
                   formControlName="isActive">
            <label class="form-check-label">
              Active
            </label>
          </div> -->

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="save()">
           {{ isEdit ? ('common.update' | translate) : ('common.save' | translate) }}
        </button>
      </div>

    </div>
  </div>
</div>
