<div class="container-fluid mt-4">
  <div class="row mb-3">
    <div class="col-8">
      <h4 class="fw-semibold">
        {{ 'notifications.notifications' | translate }}
      </h4>

      <app-global-search
        [placeholder]="'notifications.searchPlaceholder' | translate"
        [showStatus]="false"
        (search)="onSearch($event)"
        (clear)="clearFilters()">
      </app-global-search>
    </div>
  </div>

  <div class="card shadow-sm border-0">
    <div class="card-body">
      <ng-container *ngIf="loading; else tableContent">
        <div class="text-center py-4">
          <div class="spinner-border text-primary" role="status"></div>
        </div>
      </ng-container>

      <ng-template #tableContent>
        <app-reusable-table
          [columns]="columns"
          [columnFields]="columnFields"
          [data]="filteredData"
          [showActions]="false">
        </app-reusable-table>

        <div *ngIf="!loading && filteredData.length === 0"
             class="text-center py-3 text-muted">
          {{ 'notifications.noNotifications' | translate }}
        </div>
      </ng-template>
    </div>
  </div>
</div>
