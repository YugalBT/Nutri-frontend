  <div #expressionModal class="modal fade">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title " >
            {{
              isEdit
                ? ("formula.editFormula" | translate)
                : ("formula.addFormula" | translate)
            }}
          </h5>

          <button class="btn-close" (click)="closeModal()"></button>
        </div>

        <div class="modal-body">
          <div class="row">
            <div class="mb-3  col-md-3"  *ngIf="!isSupplier">
              <label class="form-label">
                {{ "supplierPrice.supplier" | translate }}
                <span class="text-danger">*</span>
              </label>
 
              <select
                class="form-select"
                [(ngModel)]="selectedSupplierId"
                (change)="onSupplierChange()"
              >
                <option [ngValue]="null">
                  {{ "supplierPrice.selectSupplier" | translate }}
                </option>

                <option *ngFor="let s of suppliers" [value]="s.supplierId">
                  {{ s.supplierName }}
                </option>
              </select>
            </div>
            <div class="mb-3 col-md-3">
              <label class="form-label">
                {{ "common.status" | translate }}
                <span class="text-danger">*</span>
              </label>
              <select  [(ngModel)]="selectedStatus" class="form-select w-100">
    
                <option [ngValue]="2" disabled>--Select Price Status--</option>
                <option [ngValue]="0">Active</option>
                <option [ngValue]="1">Draft</option>
              </select>
            </div>
 

              <!-- <div class="col-md-3">

                <label class="form-label">
                  Product
                  <sup class="text-danger">*</sup>
                </label>

                <select
                  class="form-select"
                  formControlName="productId"
                  [(ngModel)]="selectedProductId"
                  [class.is-invalid]="!selectedProductId && selectedProductId !== null">

                  <option value="" disabled>
                    Select Product
                  </option>

                  <option
                    *ngFor="let p of products"
                    [ngValue]="p.productId">
                    {{p.productName}}
                  </option>

                </select>

                <div class="invalid-feedback">
                  Product is required
                </div>

              </div> -->


            <div class="mb-3 col-md-3">
              <label class="form-label">
                {{ "formula.formulaName" | translate }}
                <span class="text-danger">*</span>
              </label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="expressionName"
                [placeholder]="'formula.formulaNamePlaceholder' | translate"
              />
            </div>
          </div>
          <div
            class="mb-3 col-md-8"
            *ngIf="isvalidated"
            class="alert alert-success mt-2"
          >
            Expression Result: <strong>{{ validatedResult }}</strong>
          </div>
          <!-- MATERIAL LIST
          <div class="row" *ngIf="materials.length">
            <div class="col-md-12">
              <h6 class="mb-3">Material Items</h6> -->

              <!-- <div class="table-responsive">
                <table class="table table-bordered align-middle">
                  <thead>
                    <tr>
                      <th>Material</th>
                      <th>%</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let m of materials; let i = index">
                      <td>
                        {{ m.materialName }}
                      </td>

                      <td>
                        <input
                          type="number"
                          class="form-control"
                          [(ngModel)]="m.marginPct"
                          (input)="calculateFromMargin(m)"
                        />
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div> -->
            <!-- </div>
          </div> -->

          <div class="expression-box mb-4">
            <label class="form-label">
              {{ "formula.expression" | translate }}
            </label>
            <button
              type="button"
              class="btn btn-sm btn-add"
              (click)="clearAll()"
              [disabled]="!expressionTokens.length"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M3 12a9 9 0 1 0 3-6.7"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <path
                  d="M3 4v6h6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
            </button>

            <div class="expression-editor">
              <span
                class="insert-point"
                [class.active]="insertIndex === 0"
                (click)="setInsertIndex(0)"
              >
              </span>

              <ng-container *ngFor="let token of expressionTokens; let i = index">
                <span
                  class="token"
                  [class.operator]="isOperator(token)"
                  (click)="removeToken(i)"
                >
                  {{ getDisplayName(token) }} ✕
                </span>

                <span
                  class="insert-point"
                  [class.active]="insertIndex === i + 1"
                  (click)="setInsertIndex(i + 1)"
                >
                </span>
              </ng-container>

              <span *ngIf="!expressionTokens.length" class="text-muted">
                Click operators or rations to build expression
              </span>
            </div>
          </div>

          <div class="row">
            <div class="col-md-12">
              <!-- OPERATORS -->
              <div class="panel mb-3">
                <button
                  class="btn btn-light"
                  *ngFor="let item of expressionItems"
                  (click)="addToken(item)"
                >
                  {{ item.displayName }}
                </button>
              </div>

              <!-- NUMBER INPUT -->
              <div class="d-flex gap-2 mb-3">
                <input
                  #numInput
                  class="form-control w-50"
                  [placeholder]="'formula.enterNumber' | translate"
                />
                <button
                  class="btn add-btn"
                  (click)="addNumber(numInput.value); numInput.value = ''"
                >
                  {{ "formula.add" | translate }}
                </button>
              </div>
            </div>

            <!-- RIGHT -->
            <!-- <div class="col-md-4">
                          <h6>Rations</h6>
                          <div class="tag-group">
                              <span class="tag" *ngFor="let r of rations" (click)="addToken(r.rationName)">
                                  {{ r.rationName }}
                              </span>
                          </div>
                      </div> -->
          </div>
        </div>

        <!-- FOOTER -->
        <div class="modal-footer">
          <button class="btn" (click)="closeModal()">
            {{ "formula.cancel" | translate }}
          </button>
          <button class="btn add-btn" (click)="onValidate()">
            {{ "formula.validate" | translate }}
          </button>
          <!-- disable save button until validation is successful -->

          <button
            *ngIf="canSave"
            class="btn add-btn"
          [disabled]="!isvalidated"
    (click)="validateExpression()"
            
          >
            {{ "formula.save" | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
  <div #validateModal class="modal fade">
  <div class="modal-dialog modal-md modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Validate Formula</h5>
        <button class="btn-close" (click)="closeValidateModal()"></button>
      </div>

      <div class="modal-body">

        <div class="mb-2">
          <label>Base Cost</label>
          <input type="number" [(ngModel)]="validateModel.baseCost" class="form-control">
        </div>

        <div class="mb-2">
          <label>Commission %</label>
          <input type="number" [(ngModel)]="validateModel.commissionPercent" class="form-control">
        </div>

        <div class="mb-2">
          <label>Bulk Processing</label>
          <input type="number" [(ngModel)]="validateModel.bulkProcessingCost" class="form-control">
        </div>

        <div class="mt-3 text-success" *ngIf="validatedResult">
          Result: <strong>{{ validatedResult }}</strong>
        </div>

      </div>

      <div class="modal-footer">
         <button class="btn" (click)="closeValidateModal()">
            {{ "formula.cancel" | translate }}
          </button>
          <button class="btn add-btn" (click)="runValidation()">
            {{ "formula.validate" | translate }}
          </button>
      </div>

    </div>
  </div>
</div>
