<div class="container mt-4 mb-4">
  <div class="card shadow-sm border-0 rounded-4 p-4">

    <!-- Header -->
     <div class="d-flex align-items-center mb-4">
      <i class="bi bi-person-circle fs-2 me-3"></i>
      <h4 class="mb-0 fw-bold">Change Password</h4>
    </div>

    <!-- Form -->
    <form [formGroup]="changePasswordForm"  (ngSubmit)="onSubmit()">

      <!-- Row 1 -->
      <div class="row mt-3">
  <!-- Current Password -->
  <div class="col-md-4">
    <label class="form-label">Current Password <sup style="color: #f00; font-size: 12px;">*</sup></label>

    <div class="input-group">
      <input [type]="showCurrent ? 'text' : 'password'" 
             class="form-control" 
             formControlName="currentPassword"
             [class.is-invalid]="isSubmitted() && f['currentPassword'].invalid">

      <span class="input-group-text" role="button" (click)="showCurrent = !showCurrent">
        <i class="fa" [ngClass]="showCurrent ? 'fa-eye' : 'fa-eye-slash'"></i>
      </span>
    </div>
  </div>

  <!-- New Password -->
  <div class="col-md-4">
    <label class="form-label">New Password <sup style="color: #f00; font-size: 12px;">*</sup></label>

    <div class="input-group">
      <input [type]="showNew ? 'text' : 'password'"
             class="form-control"
             formControlName="newPassword"
             [class.is-invalid]="isSubmitted() && f['newPassword'].invalid">

      <span class="input-group-text" role="button" (click)="showNew = !showNew">
        <i class="fa" [ngClass]="showNew ? 'fa-eye' : 'fa-eye-slash'"></i>
      </span>
    </div>

    <small class="text-danger" *ngIf="f['newPassword'].invalid && f['newPassword'].touched">
      Min 6 chars, 1 uppercase & 1 number required
    </small>
  </div>

  <!-- Confirm Password -->
  <div class="col-md-4">
    <label class="form-label">Confirm Password <sup style="color: #f00; font-size: 12px;">*</sup></label>

    <div class="input-group">
      <input [type]="showConfirm ? 'text' : 'password'"
             class="form-control"
             formControlName="confirmPassword"
             [class.is-invalid]="isSubmitted() && changePasswordForm.hasError('mismatch')">

      <span class="input-group-text" role="button" (click)="showConfirm = !showConfirm">
        <i class="fa" [ngClass]="showConfirm ? 'fa-eye' : 'fa-eye-slash'"></i>
      </span>
    </div>

    <small class="text-danger" *ngIf="changePasswordForm.hasError('mismatch') && f['confirmPassword'].touched">
      Passwords do not match!
    </small>
  </div>
</div>


      <!-- Submit -->
      <div class="d-flex justify-content-end mt-4">
        <button class="btn add-btn px-4" type="submit" [disabled]="isLoading()">
          <i class="bi bi-arrow-repeat me-2" *ngIf="isLoading()"></i>
          {{ isLoading() ? 'Updating...' : 'Update Password' }}
        </button>
      </div>
      

    </form>
  </div>
</div>
