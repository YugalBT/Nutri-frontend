<div #priceModal class="modal fade">

  <div class="modal-dialog modal-lg modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title">
          {{ isEdit ? ('productPrice.editPrice' | translate) : ('productPrice.addPrice' | translate) }}
        </h5>

        <button class="btn-close" (click)="modalInstance.hide()">
        </button>

      </div>


      <div class="modal-body">

        <form [formGroup]="form">

          <div class="row g-3">

            <!-- Product -->

            <div class="col-md-4">

              <label class="form-label">
                {{ 'productPrice.product' | translate }}
                <sup class="text-danger">*</sup>
              </label>

              <select class="form-select" formControlName="productId"
                [class.is-invalid]="form.get('productId')?.touched && form.get('productId')?.invalid">

                <option value="" disabled selected>
                  {{ 'productPrice.selectProduct' | translate }}
                </option>


                <option *ngFor="let p of products" [value]="p.productId">

                  {{p.productName}}

                </option>

              </select>

              <div class="invalid-feedback">
                {{ 'productPrice.productRequired' | translate }}
              </div>

            </div>


            <!-- Month -->

            <div class="col-md-4">

              <label class="form-label">
  {{ 'productPrice.month' | translate }}
  <sup class="text-danger">*</sup>
</label>

              <input type="month" class="form-control" formControlName="priceMonth"
                [class.is-invalid]="form.get('priceMonth')?.invalid && form.get('priceMonth')?.touched" />

              <div class="invalid-feedback">
  {{ 'productPrice.monthRequired' | translate }}
</div>

            </div>


            <!-- Previous Price -->

            <div class="col-md-4">

<label class="form-label">
  {{ 'productPrice.previousPrice' | translate }}
</label>

              <input type="number" class="form-control" placeholder="{{ 'productPrice.previousPricePlaceholder' | translate }}"
                formControlName="previousMonthPrice" />

            </div>


            <!-- Suggested Price -->

            <div class="col-md-4">

<label class="form-label">
  {{ 'productPrice.suggestedPrice' | translate }}
</label>

              <input type="number" class="form-control" placeholder="{{ 'productPrice.suggestedPricePlaceholder' | translate }}"
                formControlName="suggestedPrice" />

            </div>


            <!-- Customer Price -->

            <div class="col-md-4">

              <label class="form-label">
  {{ 'productPrice.customerPrice' | translate }}
</label>

              <input type="number" class="form-control" placeholder="{{ 'productPrice.customerPricePlaceholder' | translate }}"
                formControlName="customerPrice" />

            </div>


            <!-- Commission -->

            <div class="col-md-4">

<label class="form-label">
  {{ 'productPrice.commission' | translate }}
</label>

              <input type="number" class="form-control" placeholder="{{ 'productPrice.commissionPlaceholder' | translate }}"
                formControlName="commissionPercent" />

            </div>


            <!-- Margin -->

            <div class="col-md-4">

<label class="form-label">
  {{ 'productPrice.margin' | translate }}
</label>

              <input type="number" class="form-control" placeholder="{{ 'productPrice.marginPlaceholder' | translate }}"
                formControlName="marginPercent" />

            </div>

          </div>

        </form>

      </div>


      <div class="modal-footer">

        <button class="btn btn-outline-secondary" (click)="modalInstance.hide()">

           {{ 'common.cancel' | translate }}

        </button>

        <button class="btn add-btn" (click)="save()">

         {{ 'productPrice.savePrice' | translate }}
        </button>

      </div>

    </div>

  </div>

</div>
