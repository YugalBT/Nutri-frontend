<!-- fertilita-add-edit.component.html -->
<div #modal class="modal fade" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Edit Fertility Record' : 'Add Fertility Record' }}</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="form">
          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label">Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" formControlName="recordDate">
            </div>

            <div class="col-md-4">
              <label class="form-label">Cow ID / Ear Tag</label>
              <input type="text" class="form-control" formControlName="cowId" placeholder="e.g. IT001">
            </div>

            <div class="col-md-4">
              <label class="form-label">Cow Name</label>
              <input type="text" class="form-control" formControlName="cowName">
            </div>

            <div class="col-md-4">
              <label class="form-label">Event Type <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="eventType">
                <option *ngFor="let t of eventTypes" [value]="t">{{ t }}</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Result</label>
              <select class="form-select" formControlName="result">
                <option *ngFor="let r of resultOptions" [value]="r">{{ r }}</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Days in Milk</label>
              <input type="number" class="form-control" formControlName="daysInMilk" min="0">
            </div>

            <div class="col-md-4" *ngIf="showBullCode()">
              <label class="form-label">Bull / Semen Code</label>
              <input type="text" class="form-control" formControlName="bullCode" placeholder="e.g. BULL001">
            </div>

            <div class="col-md-4" *ngIf="showPregnancyDays()">
              <label class="form-label">Est. Days Pregnant</label>
              <input type="number" class="form-control" formControlName="estimatedDaysPregnant" min="0">
            </div>

            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" formControlName="notes" rows="2" placeholder="Additional observations..."></textarea>
            </div>

          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" (click)="closeModal()">Cancel</button>
        <button class="btn add-btn" [disabled]="isSaving" (click)="save()">
          {{ isSaving ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
        </button>
      </div>
    </div>
  </div>
</div>
