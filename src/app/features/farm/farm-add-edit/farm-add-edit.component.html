<div #farmModal class="modal fade" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Edit Farm' : 'Add Farm' }}</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Farm Name <sup class="text-danger">*</sup></label>
              <input type="text" formControlName="farmName" class="form-control" placeholder="Enter farm name">
              <div *ngIf="form.get('farmName')?.touched && form.get('farmName')?.invalid" class="text-danger">
                <div *ngIf="form.get('farmName')?.errors?.['required']">Farm Name is required.</div>
                <div *ngIf="form.get('farmName')?.errors?.['pattern']">Only alphabets and spaces allowed.</div>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Town <sup class="text-danger">*</sup></label>
              <input type="text" formControlName="town" class="form-control" placeholder="Enter town">
               <div *ngIf="form.get('town')?.touched && form.get('farmName')?.invalid" class="text-danger">
                <div *ngIf="form.get('town')?.errors?.['required']">Farm Name is required.</div>
                <div *ngIf="form.get('town')?.errors?.['pattern']">Only alphabets and spaces allowed.</div>
              </div>
              <div *ngIf="form.get('town')?.touched && form.get('town')?.invalid" class="text-danger">
                Town can only contain alphabets and spaces.
              </div>
               
            </div>
          </div>

          <div class="row g-3 mt-2">
            <div class="col-md-6">
              <label class="form-label">Country <sup class="text-danger">*</sup></label>
              <input type="text" formControlName="country" class="form-control" placeholder="Enter country">
              <div *ngIf="form.get('country')?.touched && form.get('country')?.invalid" class="text-danger">
                <div *ngIf="form.get('country')?.errors?.['required']">Country is required.</div>
                <div *ngIf="form.get('country')?.errors?.['pattern']">Only alphabets and spaces allowed.</div>
              </div>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="saveFarm()">{{ isEdit ? 'Update' : 'Save' }}</button>
      </div>

    </div>
  </div>
</div>
