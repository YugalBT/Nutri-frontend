<!-- FARM DETAILS WRAPPER -->
<div class="farm-details-wrapper mb-4" *ngIf="farm">

  <!-- HEADER -->
  <div class="farm-details-header mb-2">
    <button class="back-btn" (click)="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path
          d="M15 18l-6-6 6-6"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <span class="back-text">Back</span>
  </div>

  <!-- CONTENT CARD -->
  <div class="card farm-details-card">
    <div class="card-body">

      <div class="row gy-4 gx-5">

        <!-- Farm Name -->
        <div class="col-md-3 info-item">
          <div class="info-label">
            <i class="bi bi-building"></i>
            Farm Name
          </div>
          <div class="info-value">{{ farm.farmName }}</div>
        </div>

        <!-- Milk Price -->
        <div class="col-md-3 info-item">
          <div class="info-label">
            <i class="bi bi-currency-euro"></i>
            Milk Price (€/litre)
          </div>
          <div class="info-value">{{ farm.milkPrice }}</div>
        </div>

        <!-- Country -->
        <div class="col-md-3 info-item">
          <div class="info-label">
            <i class="bi bi-globe"></i>
            Country
          </div>
          <div class="info-value">{{ farm.country }}</div>
        </div>

        
        <!-- State -->
        <div class="col-md-2 info-item">
          <div class="info-label">State</div>
          <div class="info-value">{{ farm.state }}</div>
        </div>

        <!-- Status -->
       

        <!-- Street Address (WIDE) -->
        <div class="col-md-3 info-item">
          <div class="info-label">
            <i class="bi bi-geo-alt"></i>
            Street Address
          </div>
          <div class="info-value">{{ farm.streetAddress }}</div>
        </div>

        <!-- City -->
        <div class="col-md-3 info-item">
          <div class="info-label">City</div>
          <div class="info-value">{{ farm.city }}</div>
        </div>


        <!-- Zip -->
        <div class="col-md-3 info-item">
          <div class="info-label">Zip Code</div>
          <div class="info-value">{{ farm.zipCode }}</div>
        </div>
        

      </div>

    </div>
  </div>
</div>


<div class="card p-3 template-tabs">
  <ul class="nav nav-tabs mb-3">
    <!-- Farm -->
    <!-- <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'farm'"
        (click)="setTab('farm')">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 21V10l9-7 9 7v11"
                stroke="currentColor" stroke-width="2" />
          <path d="M9 21v-6h6v6"
                stroke="currentColor" stroke-width="2" />
        </svg>
        Farm
      </button>
    </li> -->

    <!-- Animal Group -->
    <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'animalGroup'"
        (click)="setTab('animalGroup')"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="2" />
          <circle cx="16" cy="8" r="3" stroke="currentColor" stroke-width="2" />
          <path d="M2 20c0-3 3-6 6-6" stroke="currentColor" stroke-width="2" />
          <path d="M22 20c0-3-3-6-6-6" stroke="currentColor" stroke-width="2" />
        </svg>
        Animal Group Management
      </button>
    </li>

    <!-- Feed -->
    <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'feed'"
        (click)="setTab('feed')"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M4 12h16" stroke="currentColor" stroke-width="2" />
          <path d="M6 16h12" stroke="currentColor" stroke-width="2" />
          <path d="M8 8h8" stroke="currentColor" stroke-width="2" />
        </svg>
        Feed Management
      </button>
    </li>

    <!-- Ration -->
    <li class="nav-item">
      <button
        class="nav-link"
        [class.active]="activeTab === 'ration'"
        (click)="setTab('ration')"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M4 4h16v16H4z" stroke="currentColor" stroke-width="2" />
          <path
            d="M8 8h8M8 12h8M8 16h5"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
        Ration Management
      </button>
    </li>
  </ul>

  <!-- TAB CONTENT -->
  <div class="tab-content">
    <ng-container *ngIf="activeTab === 'animalGroup'">
      <app-animal-group-list [farmId]="farmId" ></app-animal-group-list>
    </ng-container>

    <ng-container *ngIf="activeTab === 'feed'">
      <app-feed-list [farmId]="farmId" ></app-feed-list>
    </ng-container>

    <ng-container *ngIf="activeTab === 'ration'">
      <app-ration-list [farmId]="farmId" ></app-ration-list>
    </ng-container>
  </div>
</div>
