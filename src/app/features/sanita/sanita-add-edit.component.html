<!-- sanita-add-edit.component.html -->
<div #modal class="modal fade" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">{{ isEdit ? 'Edit Health Event' : 'Add Health Event' }}</h5>
        <button class="btn-close" (click)="closeModal()"></button>
      </div>
      <div class="modal-body">
        <form [formGroup]="form">
          <div class="row g-3">

            <div class="col-md-4">
              <label class="form-label">Event Date <span class="text-danger">*</span></label>
              <input type="date" class="form-control" formControlName="eventDate">
            </div>

            <div class="col-md-4">
              <label class="form-label">Cow ID (blank = herd)</label>
              <input type="text" class="form-control" formControlName="cowId" placeholder="Ear tag or ID">
            </div>

            <div class="col-md-4">
              <label class="form-label">Event Type <span class="text-danger">*</span></label>
              <select class="form-select" formControlName="eventType">
                <option *ngFor="let t of eventTypes" [value]="t">{{ t }}</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Diagnosis</label>
              <input type="text" class="form-control" formControlName="diagnosis" placeholder="e.g. Clinical mastitis, right rear quarter">
            </div>

            <div class="col-md-6">
              <label class="form-label">Treatment</label>
              <input type="text" class="form-control" formControlName="treatment" placeholder="e.g. Intramammary antibiotic x3 days">
            </div>

            <div class="col-md-6">
              <label class="form-label">Veterinarian</label>
              <input type="text" class="form-control" formControlName="veterinarianName" placeholder="Dr. name (optional)">
            </div>

            <div class="col-md-3">
              <label class="form-label">Withholding Days</label>
              <input type="number" class="form-control" formControlName="withholdingDays" min="0" placeholder="0">
              <small class="text-muted">Days milk cannot be delivered</small>
            </div>

            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" formControlName="notes" rows="2" placeholder="Additional observations..."></textarea>
            </div>

          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn" (click)="closeModal()">Cancel</button>
        <button class="btn add-btn" [disabled]="isSaving" (click)="save()">
          {{ isSaving ? 'Saving...' : (isEdit ? 'Update' : 'Save') }}
        </button>
      </div>
    </div>
  </div>
</div>
