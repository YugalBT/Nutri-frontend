<div class="table-responsive">
  <table class="table table-hover align-middle">

    <!-- Table Header -->
    <thead class="table-light">
      <tr>
        <th *ngFor="let col of columns" [class.text-start]="col === 'Company' || col === 'Name'">{{ col }}</th>
        <th *ngIf="showActions">Actions</th>
      </tr>
    </thead>

    <!-- Table Body -->
    <tbody>
      <tr *ngFor="let row of data">
        <td *ngFor="let col of columns">{{ row[col.toLowerCase()] }}</td>
        <td *ngIf="showActions">
          <div class="dropdown">
            <button class="btn btn-sm btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
              <!-- three dots icon svg -->
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
    <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
  </svg>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item"><i class="bi bi-pencil me-2"></i>Edit</a></li>
              <li><a class="dropdown-item text-danger"><i class="bi bi-trash me-2"></i>Delete</a></li>
            </ul>
          </div>
        </td>
      </tr>
    </tbody>

  </table>

  <!-- Pagination Placeholder -->
  <nav>
    <ul class="pagination pagination-sm justify-content-end">
      <li class="page-item disabled"><a class="page-link">Previous</a></li>
      <li class="page-item active"><a class="page-link">1</a></li>
      <li class="page-item"><a class="page-link">2</a></li>
      <li class="page-item"><a class="page-link">Next</a></li>
    </ul>
  </nav>
</div>
