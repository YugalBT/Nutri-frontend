<div class="table-wrapper ">

  <!-- No Data Found Message -->
  

  <!-- Table -->
   <div class="table-responsive custom-table-responsive">
  <table  class="table modern-table align-middle table-responsive">

    <!-- Table Header -->
    <thead>
      <tr>
        <th *ngFor="let col of columns">{{ col }}</th>
        <th *ngIf="showActions" class="text-center">{{ 'common.actions' | translate }}</th>
      </tr>
    </thead>

    <!-- Table Body -->
    <tbody *ngIf="data && data.length > 0">
      <tr *ngFor="let row of data">

        <!-- CELL LOOP -->
        <td *ngFor="let col of columns; let i = index">
          <ng-container *ngIf="getCell(row, columnFields?.[i] || col.toLowerCase()) as cell">

            <!-- LOGO -->
            <ng-container *ngIf="cell.type === 'logo'">
              <img [src]="cell.value" class="cell-logo" (error)="onImgError($event)" />
            </ng-container>

            <!-- COLOR SWATCH -->
            <ng-container *ngIf="cell.type === 'color'">
              <span class="color-swatch" [style.background]="cell.value"></span>
            </ng-container>

            <!-- IMAGE GALLERY -->
            <ng-container *ngIf="cell.type === 'images'">
              <div class="image-grid">
                <div class="image-cell" *ngFor="let img of cell.value">
                  <img [src]="img" loading="lazy" (error)="onImgError($event)" />
                </div>
              </div>
            </ng-container>

            <ng-container *ngIf="cell.type === 'switch'">
              <label class="switch">
                <input type="checkbox" [checked]="cell.value" [checked]="cell.value"
                  (change)="toggleActive.emit({ row, isActive: $any($event.target).checked })">
                <span class="slider"></span>
              </label>
            </ng-container>
            <ng-container *ngIf="cell.type === 'boolean'">
              <span class="badge" [class.active]="cell.value" [class.inactive]="!cell.value">
                {{ cell.value ? 'Active' : 'Inactive' }}
              </span>
            </ng-container>

            <ng-container *ngIf="cell.type === 'text'">

              <a style="color:#2CA28F !important ;" *ngIf="clickableField === (columnFields?.[i] || col.toLowerCase())" href="javascript:void(0)"
                class=" fw-semibold" (click)="onCellClick(columnFields?.[i] || col.toLowerCase(), row)">
                {{ cell.value }}
              </a>

              <span *ngIf="clickableField !== (columnFields?.[i] || col.toLowerCase())">
                {{ cell.value }}
              </span>

            </ng-container>
          </ng-container>
        </td>

        <td *ngIf="showActions" class="text-center actions-col">
          <div class="dropdown">
            <button class="btn action-btn" data-bs-toggle="dropdown">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="#555" viewBox="0 0 20 20">
                <path
                  d="M9.5 2a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0 6a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0 6a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
              </svg>



            </button>

            <ul class="dropdown-menu shadow-sm">
              <li>
                <a class="dropdown-item" (click)="editRow.emit(row)">
                  <i class="bi bi-pencil me-2"></i>{{ 'common.edit' | translate }}
                </a>
              </li>
              <li>
                <a class="dropdown-item text-danger" (click)="deleteRow.emit(row)">
                  <i class="bi bi-trash me-2"></i>{{ 'common.delete' | translate }}
                </a>
              </li>
            </ul>
          </div>

        </td>

      </tr>
    </tbody>
    

  </table>
</div>
<div *ngIf="!data || data.length === 0" class="no-data-container">
    <div class="no-data-content">
      <img loading="lazy" src="assets/image/no-data.png" alt="No Data" class="no-data-icon" />
      <h3 class="no-data-title">{{ 'common.noData' | translate }}</h3>
      <p class="no-data-message">{{ 'common.noRecordsMatch' | translate }}</p>
    </div>
  </div>
  <!-- Pagination -->
  <!-- <nav *ngIf="pageable && data && data.length > 0" class="pagination-wrapper mt-3">
    <ul class="pagination pagination-sm justify-content-end" style="cursor: pointer;">
      <li class="page-item" [class.disabled]="pageIndex <= 0">
        <a class="page-link" (click)="changePage(pageIndex - 1)">Previous</a>
      </li>

      <li class="page-item" *ngFor="let i of pages" [class.active]="i === pageIndex">
        <a class="page-link" (click)="changePage(i)">
          {{ i + 1 }}
        </a>
      </li>

      <li class="page-item" [class.disabled]="pageIndex >= totalPages - 1">
        <a class="page-link" (click)="changePage(pageIndex + 1)">Next</a>
      </li>
    </ul>
  </nav> -->
  <mat-paginator *ngIf="pageable && data && data.length > 0" [length]="totalRecords" [pageSize]="pageSize"
    [pageIndex]="pageIndex" [pageSizeOptions]="[10, 25, 50, 100]" (page)="onPaginate($event)">
  </mat-paginator>

</div>
