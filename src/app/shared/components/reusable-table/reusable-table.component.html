<div class="table-responsive white-with-shadow mt-30">
  <table class="table table-hover align-middle">

    <!-- Table Header -->
    <thead class="table-light">
      <tr>
        <th *ngFor="let col of columns">{{ col }}</th>
        <th *ngIf="showActions" class="text-center">Actions</th>
      </tr>
    </thead>

    <!-- Table Body -->
    <tbody>
      <tr *ngFor="let row of data">
        <td *ngFor="let col of columns; let i = index">
          <ng-container *ngIf="columnFields && columnFields[i]; else defaultCell">
           <!-- Master Switch -->
     <ng-container [ngSwitch]="columnFields[i]">

      <!-- Logo -->
      <ng-container *ngSwitchCase="'logo'">
        <img 
          [src]="row?.logo"
          style="width:40px; height:40px; border-radius:6px; object-fit:cover; background:#f3f3f3;" 
        />
      </ng-container>

      <!-- Primary Color -->
      <ng-container *ngSwitchCase="'primaryColor'">
        <div
          [style.backgroundColor]="row?.primaryColor"
          style="
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1px solid #ccc;
            display: inline-block;
          ">
        </div>
  

         </ng-container>
              <ng-container *ngSwitchCase="'isActive'">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" [checked]="row?.isActive" (change)="toggleActive.emit({ row: row, isActive: $any($event.target).checked })">
                </div>
              </ng-container>
              <ng-container *ngIf="formatCell(row, columnFields[i]) as cell">
                <ng-container [ngSwitch]="cell.type">
                  <ng-container *ngSwitchCase="'color'">
                    <div class="color-cell d-flex align-items-center gap-2">
                      <span class="color-swatch" [style.background]="cell.value" aria-hidden="true"></span>
                      <!-- <span class="color-hex">{{ cell.value }}</span> -->
                    </div>
                  </ng-container>
                  <ng-container *ngSwitchCase="'images'">
                    <ng-container *ngIf="cell.value && cell.value.length > 0; else noImage1">
                      <div class="image-grid">
                        <ng-container *ngFor="let img of cell.value">
                          <div class="image-cell"><img [src]="img" alt="image" loading="lazy" (error)="onImgError($event)"/></div>
                        </ng-container>
                      </div>
                    </ng-container>
                    <ng-template #noImage1>
                      <div class="image-grid">
                        <div class="image-cell"><img src="/assets/image/no-image.png" alt="no image"/></div>
                      </div>
                    </ng-template>
                  </ng-container>
                  <ng-container *ngSwitchCase="'boolean'">
                    <!-- {{ cell.value ? 'Active' : 'Inactive' }} -->
                  </ng-container>
                  <ng-container *ngSwitchDefault>
                    {{ cell.value }}
                  </ng-container>
                </ng-container>
              </ng-container>
            </ng-container>
          </ng-container>
          <ng-template #defaultCell>
            <ng-container *ngIf="formatCell(row, col.toLowerCase()) as cell">
              <ng-container [ngSwitch]="cell.type">
                <ng-container *ngSwitchCase="'color'">
                  <div class="color-cell d-flex align-items-center gap-2">
                    <span class="color-swatch" [style.background]="cell.value" aria-hidden="true"></span>
                    <span class="color-hex">{{ cell.value }}</span>
                  </div>
                </ng-container>
                <ng-container *ngSwitchCase="'images'">
                  <ng-container *ngIf="cell.value && cell.value.length > 0; else noImage2">
                    <div class="image-grid">
                      <ng-container *ngFor="let img of cell.value">
                        <div class="image-cell"><img [src]="img" alt="image" loading="lazy" (error)="onImgError($event)"/></div>
                      </ng-container>
                    </div>
                  </ng-container>
                  <ng-template #noImage2>
                    <div class="image-grid">
                      <div class="image-cell"><img src="/assets/image/no-image.png" alt="no image"/></div>
                    </div>
                  </ng-template>
                </ng-container>
                <ng-container *ngSwitchCase="'boolean'">
                  {{ cell.value ? 'Active' : 'Inactive' }}
                </ng-container>
                <ng-container *ngSwitchDefault>
                  {{ cell.value }}
                </ng-container>
              </ng-container>
            </ng-container>
          </ng-template>
        </td>
        
        <!-- Action Buttons -->
        <td *ngIf="showActions" class="text-center">
          <div class="dropdown">
            <button class="btn" data-bs-toggle="dropdown">
              <!-- SVG Three Dots -->
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                <path
                  d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 
                  1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
              </svg>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" (click)="$event.preventDefault(); editRow.emit(row)"><i class="bi bi-pencil "></i>Edit</a></li>
              <li><a class="dropdown-item text-danger" (click)="$event.preventDefault(); deleteRow.emit(row)"><i class="bi bi-trash "></i>Delete</a></li>
            </ul>
          </div>
        </td>
      </tr>
    </tbody>

  </table>

  <!-- Simple Bootstrap pagination for tables -->
  <nav *ngIf="pageable" class="mt-3">
    <ul class="pagination pagination-sm justify-content-end">
      <li class="page-item" [class.disabled]="pageIndex <= 0">
        <a class="page-link" href="#" (click)="$event.preventDefault(); changePage(pageIndex - 1)">Previous</a>
      </li>
      <!-- show a compact page range -->
      <li class="page-item" *ngFor="let i of pages" [class.active]="i === pageIndex">
        <a class="page-link" href="#" (click)="$event.preventDefault(); changePage(i)">{{ i + 1 }}</a>
      </li>
      <li class="page-item" [class.disabled]="(pageIndex + 1) >= totalPages">
        <a class="page-link" href="#" (click)="$event.preventDefault(); changePage(pageIndex + 1)">Next</a>
      </li>
    </ul>
  </nav>
</div>
