<div class="table-responsive white-with-shadow mt-30">
  <table class="table table-hover align-middle">

    <!-- Table Header -->
    <thead class="table-light">
      <tr>
        <th *ngFor="let col of columns">{{ col }}</th>
        <th *ngIf="showActions" class="text-center">Actions</th>
      </tr>
    </thead>

    <!-- Table Body -->
    <tbody>
      <tr *ngFor="let row of data">
        <td *ngFor="let col of columns; let i = index">
          <ng-container *ngIf="columnFields && columnFields[i]; else defaultCell">
            <ng-container [ngSwitch]="columnFields[i]">
              <ng-container *ngSwitchCase="'isActive'">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" [checked]="row?.isActive" (change)="toggleActive.emit({ row: row, isActive: $any($event.target).checked })">
                </div>
              </ng-container>
              <ng-container *ngSwitchDefault>
                {{ formatCell(row, columnFields[i]) }}
              </ng-container>
            </ng-container>
          </ng-container>
          <ng-template #defaultCell>{{ row[col.toLowerCase()] }}</ng-template>
        </td>
        
        <!-- Action Buttons -->
        <td *ngIf="showActions" class="text-center">
          <div class="dropdown">
            <button class="btn" data-bs-toggle="dropdown">
              <!-- SVG Three Dots -->
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                fill="currentColor" class="bi bi-three-dots-vertical" viewBox="0 0 16 16">
                <path
                  d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 
                  1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
              </svg>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" (click)="$event.preventDefault(); editRow.emit(row)"><i class="bi bi-pencil "></i>Edit</a></li>
              <li><a class="dropdown-item text-danger" (click)="$event.preventDefault(); deleteRow.emit(row)"><i class="bi bi-trash "></i>Delete</a></li>
            </ul>
          </div>
        </td>
      </tr>
    </tbody>

  </table>

  <!-- Simple Bootstrap pagination for tables -->
  <nav *ngIf="pageable" class="mt-3">
    <ul class="pagination pagination-sm justify-content-end">
      <li class="page-item" [class.disabled]="pageIndex <= 0">
        <a class="page-link" href="#" (click)="$event.preventDefault(); changePage(pageIndex - 1)">Previous</a>
      </li>
      <!-- show a compact page range -->
      <li class="page-item" *ngFor="let i of pages" [class.active]="i === pageIndex">
        <a class="page-link" href="#" (click)="$event.preventDefault(); changePage(i)">{{ i + 1 }}</a>
      </li>
      <li class="page-item" [class.disabled]="(pageIndex + 1) >= totalPages">
        <a class="page-link" href="#" (click)="$event.preventDefault(); changePage(pageIndex + 1)">Next</a>
      </li>
    </ul>
  </nav>
</div>
