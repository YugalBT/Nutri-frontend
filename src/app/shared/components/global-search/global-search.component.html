<div class="global-search container-fluid">
  <div class="row align-items-center g-3">

    <div class="col-auto" *ngIf="label">
      <label class="fw-bold" [attr.for]="'global-search-input'">Search</label>
    </div>

    <div class="col-md-6 col-sm-12">
      <div class="input-group">
        <input
          id="global-search-input"
          class="form-control"
          type="text"
          name="search"
          [placeholder]="placeholder"
          [formControl]="searchControl"
          [attr.aria-label]="placeholder"
        />
        <button class="btn btn-outline-secondary" (click)="doClear()" aria-label="Clear search">
          <!-- inline clear (x) SVG -->
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.75.75 0 1 1 1.06 1.06L9.06 8l3.22 3.22a.75.75 0 0 1-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 0 1-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06z" fill="#495057"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="col-md-3 col-sm-6" *ngIf="showStatus">
      <select class="form-select" [formControl]="statusControl">
        <option value="">All Status</option>
        <option value="1">Active</option>
        <option value="0">Inactive</option>
      </select>
    </div>

  </div>
</div>
