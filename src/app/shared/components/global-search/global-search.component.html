<div class="global-search-modern container-fluid py-3" role="search">

  <!-- Label Row -->
  <div class="row mb-1" *ngIf="label">
    <div class="col-12">
      <label class="gs-label-modern fw-semibold" for="global-search-input">
        {{ label }}
      </label>
    </div>
  </div>

  <!-- Search + Status Row -->
  <div class="row g-3">

    <!-- Search Input -->
    <div class="col-md-10 col-sm-12">
      <div class="search-wrapper-modern">

        <span class="bi bi-search search-icon-modern">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8.82491" cy="8.82491" r="6.74142" stroke="#555555" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M13.5137 13.8638L16.1567 16.5" stroke="#555555" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>

        </span>

        <input id="global-search-input" type="text" class="search-input-modern" [placeholder]="placeholder"
          [formControl]="searchControl" [attr.aria-label]="placeholder" />

        <button class="clear-btn-modern" *ngIf="searchControl.value" (click)="doClear()">
          <i class="bi bi-x-lg"></i>
        </button>

      </div>
    </div>

    <!-- Status Select -->
    <div class="col-md-2 col-sm-6" *ngIf="showStatus">
      <select class="form-select form-control" [formControl]="statusControl">
        <option value="">{{ 'common.all' | translate }}</option>
        <option value="1">{{ 'common.active' | translate }}</option>
        <option value="0">{{ 'common.inactive' | translate }}</option>
      </select>
    </div>

    <div class="col-md-2 col-sm-6 " *ngIf="isSuperAdmin && ShowCheckBox">
      <label class="form-label">{{ 'role.roleIsShow' | translate }}</label>
      <label class="switch">
        <input type="checkbox" [checked]="!isShow" (change)="isShow.emit($any($event.target).checked)">
        <span class="slider"></span>
      </label>

    </div>

  </div>
</div>
