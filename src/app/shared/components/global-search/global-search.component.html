<div class="global-search-modern container-fluid py-3" role="search">

  <!-- Label Row -->
  <div class="row mb-1" *ngIf="label">
    <div class="col-12">
      <label class="gs-label-modern fw-semibold" for="global-search-input">
        {{ label }}
      </label>
    </div>
  </div>

  <!-- Search + Status Row -->
  <div class="row g-3">

    <!-- Search Input -->
    <div class="col-md-7 col-sm-12">
      <div class="search-wrapper-modern">

        <i class="bi bi-search search-icon-modern"></i>

        <input id="global-search-input"
          type="text"
          class="search-input-modern"
          [placeholder]="placeholder"
          [formControl]="searchControl"
          [attr.aria-label]="placeholder" />

        <button class="clear-btn-modern" *ngIf="searchControl.value" (click)="doClear()">
          <i class="bi bi-x-lg"></i>
        </button>

      </div>
    </div>

    <!-- Status Select -->
    <div class="col-md-3 col-sm-6" *ngIf="showStatus">
      <select class="form-select select-modern" [formControl]="statusControl">
        <option value="">{{ 'common.all' | translate }}</option>
        <option value="1">{{ 'common.active' | translate }}</option>
        <option value="0">{{ 'common.inactive' | translate }}</option>
      </select>
    </div>

  </div>
</div>
