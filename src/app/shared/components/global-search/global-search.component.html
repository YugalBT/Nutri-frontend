<div class="gs-modern-container" role="search">
  <!-- Header with Search and Toggle -->
  <div class="gs-header">
    <div class="gs-header-top">
      <!-- Label & Filter Toggle -->
      <div class="gs-header-left">
        <label class="gs-label" for="global-search-input" *ngIf="label">
          {{ label }}
        </label>
      </div>
      
      <!-- Search Input and Status Filter in one line -->
      <div class="gs-header-controls">
        <!-- Search Input -->
        <div class="gs-search-main">
          <div class="gs-input-wrapper">
            <span class="gs-input-icon gs-search-icon">
              <i class="bi bi-search"></i>
            </span>
            <input
              id="global-search-input"
              type="text"
              class="gs-input"
              [placeholder]="placeholder"
              [formControl]="searchControl"
              [attr.aria-label]="placeholder"
            />
            <button
              class="gs-clear-btn"
              *ngIf="searchControl.value"
              (click)="doClear()"
              type="button"
              [attr.aria-label]="'Clear search'"
            >
              <i class="bi bi-x-circle-fill"></i>
            </button>
          </div>
        </div>

        <!-- Status Filter (Active/Inactive) -->
        <div class="gs-header-filter" *ngIf="showStatus">
          <select 
            id="status-select"
            class="gs-header-select" 
            [formControl]="statusControl" 
            [attr.aria-label]="'Filter by status'"
          >
            <option value="">{{ 'common.all' | translate }}</option>
            <option value="1">{{ 'common.active' | translate }}</option>
            <option value="0">{{ 'common.inactive' | translate }}</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <!-- Filters Section (Collapsible) -->
  <div class="gs-filters-section" [class.gs-collapsed]="!isFiltersExpanded">
    <!-- ================= ADMIN LAYOUT ================= -->
    <ng-container *ngIf="isSuperAdmin; else normalLayout">
      <div class="gs-grid gs-grid-admin">
        <!-- Master Template Toggle -->
        <div class="gs-col gs-col-filter" *ngIf="showMasterCheckbox">
          <div class="gs-filter-group">
            <label class="gs-checkbox-label">
              <span class="gs-label-text">Master Template</span>
              <label class="gs-switch">
                <input type="checkbox" [formControl]="masterControl" />
                <span class="gs-slider"></span>
              </label>
            </label>
          </div>
        </div>

        <!-- Role Checkbox -->
        <div class="gs-col gs-col-filter" *ngIf="ShowCheckBox">
          <div class="gs-filter-group">
            <label class="gs-checkbox-label">
              <span class="gs-label-text">{{ 'role.roleIsShow' | translate }}</span>
              <label class="gs-switch">
                <input
                  type="checkbox"
                  [checked]="!isShow"
                  (change)="isShow.emit($any($event.target).checked)"
                />
                <span class="gs-slider"></span>
              </label>
            </label>
          </div>
        </div>
      </div>
    </ng-container>

    <!-- ================= NORMAL LAYOUT ================= -->
    <ng-template #normalLayout>
      <div class="gs-grid gs-grid-normal">
        <!-- Role Checkbox -->
        <div class="gs-col gs-col-filter" *ngIf="isSuperAdmin && ShowCheckBox">
          <div class="gs-filter-group">
            <label class="gs-checkbox-label">
              <span class="gs-label-text">{{ 'role.roleIsShow' | translate }}</span>
              <label class="gs-switch">
                <input
                  type="checkbox"
                  [checked]="!isShow"
                  (change)="isShow.emit($any($event.target).checked)"
                />
                <span class="gs-slider"></span>
              </label>
            </label>
          </div>
        </div>
      </div>
    </ng-template>

    <!-- Clear Filters Action -->
    <div class="gs-filters-footer" *ngIf="hasActiveFilters">
      <button 
        class="gs-clear-filters-btn" 
        (click)="clearAllFilters()"
        type="button"
        [attr.aria-label]="'Clear all filters'"
      >
        <i class="bi bi-x-lg"></i>
        <span>Clear All Filters</span>
      </button>
    </div>
  </div>
</div>
