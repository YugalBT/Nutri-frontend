<div *ngIf="visible" class="confirm-overlay">
  <div class="confirm-dialog">

    <!-- SVG Icon -->
    <div class="confirm-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 512 512" fill="#fff">
        <path d="M160 384h-16a16 16 0 0 1-16-16V144a16 16 0 0 1 16-16h16a16 16 0 0 1 16 16v224a16 16 0 0 1-16 16zm-48 0h-16a16 16 0 0 1-16-16V144a16 16 0 0 1 16-16h16a16 16 0 0 1 16 16v224a16 16 0 0 1-16 16zm224 0a16 16 0 0 1-16-16V144a16 16 0 0 1-16-16h-16a16 16 0 0 1-16 16v224a16 16 0 0 1-16 16zm48 0h-16a16 16 0 0 1-16-16V144a16 16 0 0 1 16-16h16a16 16 0 0 1 16 16v224a16 16 0 0 1-16 16zm80-240h-48V96a96 96 0 0 0-192 0v48H48a16 16 0 0 0-16 16v32a16 16 0 0 0 16 16h416a16 16 0 0 0 16-16v-32a16 16 0 0 0-16-16z" />
      </svg>
    </div>

    <h4 class="confirm-title">{{ title }}</h4>
    <p class="confirm-message">{{ message }}</p>

    <div class="confirm-footer">
      <button class="btn-cancel" (click)="onNo()">No</button>
      <button class="btn-yes" (click)="onYes()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 512 512" fill="white">
          <path d="M192 384h-48v-64h48zm128 0h-48v-32h48zM464 64H48A48 48 0 0 0 0 112v288a48 48 0 0 0 48 48h416a48 48 0 0 0 48-48V112a48 48 0 0 0-48-48z"/>
        </svg>
        Yes
      </button>
    </div>
  </div>
</div>
