<div *ngIf="visible" class="confirm-overlay">
  <div class="confirm-dialog">
    <div class="confirm-header">
      <h5>{{ title }}</h5>
      <button type="button" class="close-btn" (click)="onNo()">&times;</button>
    </div>
    <div class="confirm-body">
      <p>{{ message }}</p>
    </div>
    <div class="confirm-footer">
      <button type="button" class="btn btn-outline-secondary" (click)="onNo()">{{ 'common.cancel' | translate }}</button>
      <button type="button" class="btn btn-primary" (click)="onYes()">{{ 'common.yes' | translate }}</button>
    </div>
  </div>
</div>
